<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Poppins from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* global reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #411c0e8b;
            color: #3e2c26;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 35px;
            padding: 1rem 1rem;
            max-width: 420px;
            width: 95%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h1 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            margin-top: 0.7rem;
        }

        .card p {
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .form-group input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #5f3e2b;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }

        .form-group input[type="email"]:focus {
            border-color: #3e2c26;
        }

        .btn {
            display: inline-block;
            background-color: #411C0EE5;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-weight: 600;
            transition: background-color 0.2s;
            border: none;
            outline: none;
            box-shadow: none;
        }

        .btn:hover {
            cursor: pointer;
            background-color: #411C0E;
        }

        .btn:focus,
        .btn:active {
            outline: none;
            border: none;
            box-shadow: none;
        }

        .link {
            font-size: 0.8rem;
            color: #1A00FF;
            text-decoration: none;
            margin-top: 0.6rem;
            display: inline-block;
        }

        .link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot Password</h1>
        <p>Please enter your verified email address from your account.</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="user@example.com" required>
            </div>
            <button type="submit" class="btn">Send Verification</button>
        </form>

        <a href="login.html" class="link">Back to Login</a>
    </div>
</body>
</html>
